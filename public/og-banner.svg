  <rect x="572" y="460" width="210" height="46" rx="23" fill="#e8f0fb"/>
  <text x="677" y="489" font-family="Arial, sans-serif" font-size="21" fill="#1a5fa8" text-anchor="middle" font-weight="600">Patient Care</text>

